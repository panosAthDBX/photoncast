name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format Check
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy Lints
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-features

      - name: Run tests
        run: cargo test --all-features --workspace

  build:
    name: Build (Release)
    runs-on: macos-latest
    needs: [fmt, clippy, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoncast-macos
          path: target/release/photoncast
          if-no-files-found: warn

  dmg:
    name: Build DMG
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release app bundle
        run: ./scripts/release-build.sh

      - name: Create DMG
        run: ./scripts/create-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoncast-dmg
          path: build/PhotonCast.dmg
          if-no-files-found: error

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    outputs:
      content: ${{ steps.changelog.outputs.content }}
      latest_tag: ${{ steps.changelog.outputs.latest_tag }}
      commit_count: ${{ steps.changelog.outputs.commit_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          output="build/changelog-main.md"
          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [[ -n "${last_tag}" ]]; then
            range="${last_tag}..HEAD"
            since_label="Since tag: ${last_tag}"
          else
            range="$(git rev-list --max-parents=0 HEAD)..HEAD"
            since_label="Since: initial commit"
          fi

          {
            echo "# Changelog"
            echo
            echo "Generated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "Branch: ${GITHUB_REF_NAME}"
            echo "${since_label}"
            echo
            echo "## Commits"
            git log --reverse --pretty=format:'- %h %s (%an)' "${range}"
          } > "${output}"

          cat "${output}" >> "${GITHUB_STEP_SUMMARY}"

          if [[ -n "${last_tag}" ]]; then
            commit_count="$(git rev-list --count "${last_tag}..HEAD")"
          else
            commit_count="$(git rev-list --count HEAD)"
          fi

          {
            echo "content<<EOF"
            cat "${output}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "latest_tag=${last_tag}" >> "$GITHUB_OUTPUT"
          echo "commit_count=${commit_count}" >> "$GITHUB_OUTPUT"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-main
          path: build/changelog-main.md
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [dmg, changelog]
    permissions:
      contents: write
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: photoncast-dmg
          path: build

      - name: Create checksum
        shell: bash
        run: |
          set -euo pipefail
          shasum -a 256 build/PhotonCast.dmg > build/PhotonCast.dmg.sha256

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y.%m.%d-%H%M%S')"
          tag="main-build-${timestamp}"
          title="Main Build ${timestamp}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "title=${title}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          files: |
            build/PhotonCast.dmg
            build/PhotonCast.dmg.sha256
          body: |
            Automated main-branch build release.

            - Commit: ${{ github.sha }}
            - Branch: main
            - Commits since last tag: ${{ needs.changelog.outputs.commit_count }}

            ${{ needs.changelog.outputs.content }}
