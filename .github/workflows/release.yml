name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  APP_NAME: PhotonCast
  BUNDLE_ID: com.photoncast.app

jobs:
  # Build and test before creating release
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release --workspace

      - name: Upload release binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoncast-release-binary
          path: target/release/photoncast
          if-no-files-found: error
          retention-days: 1

  # Create signed, notarized DMG release
  create-release:
    name: Create Release
    runs-on: macos-latest
    needs: build-and-test
    environment: release
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Validate release signing and notarization secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          API_KEY_ID: ${{ secrets.API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.API_KEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          missing=0

          require_secret() {
            local key="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "Error: Required secret '$key' is not configured for release tags." >&2
              missing=1
            fi
          }

          require_secret "MACOS_CERTIFICATE" "$MACOS_CERTIFICATE"
          require_secret "MACOS_CERTIFICATE_PASSWORD" "$MACOS_CERTIFICATE_PASSWORD"
          require_secret "MACOS_KEYCHAIN_PASSWORD" "$MACOS_KEYCHAIN_PASSWORD"
          require_secret "APPLE_DEVELOPER_ID" "$APPLE_DEVELOPER_ID"

          has_api_key_auth=0
          if [[ -n "$API_KEY_ID" || -n "$API_KEY_ISSUER_ID" || -n "$API_KEY_BASE64" ]]; then
            if [[ -n "$API_KEY_ID" && -n "$API_KEY_ISSUER_ID" && -n "$API_KEY_BASE64" ]]; then
              has_api_key_auth=1
            else
              echo "Error: API key notarization requires API_KEY_ID, API_KEY_ISSUER_ID, and API_KEY_BASE64 together." >&2
              missing=1
            fi
          fi

          if [[ $has_api_key_auth -eq 0 ]]; then
            require_secret "APPLE_ID" "$APPLE_ID"
            require_secret "APPLE_APP_SPECIFIC_PASSWORD" "$APPLE_APP_SPECIFIC_PASSWORD"
          fi

          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      # Setup code signing certificates from GitHub secrets
      - name: Setup signing certificates
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          # Create keychain
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          CERTIFICATE_FILE="certificate.p12"
          trap 'rm -f "$CERTIFICATE_FILE"' EXIT
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERTIFICATE_FILE"
          security import "$CERTIFICATE_FILE" -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

          echo "Certificate imported successfully"

      # Build release app bundle
      - name: Build release app bundle
        run: |
          ./scripts/release-build.sh ${{ steps.version.outputs.version }}

      # Sign the app bundle
      - name: Sign app bundle
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          set -euo pipefail
          ./scripts/sign.sh "$APPLE_DEVELOPER_ID"

      # Create DMG
      - name: Create DMG
        run: |
          ./scripts/create-dmg.sh

      # Notarize the DMG (requires Apple Developer account)
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_KEY_ID: ${{ secrets.API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.API_KEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -n "$API_KEY_ID" && -n "$API_KEY_ISSUER_ID" && -n "$API_KEY_BASE64" ]]; then
            # Use API Key authentication
            echo "$API_KEY_BASE64" | base64 --decode > AuthKey.p8
            export API_KEY_PATH="$(pwd)/AuthKey.p8"
            trap 'rm -f AuthKey.p8' EXIT
            ./scripts/notarize.sh --api-key
          else
            # Use Apple ID authentication
            ./scripts/notarize.sh
          fi

      # Generate SHA256 checksum
      - name: Generate checksum
        run: |
          cd build
          shasum -a 256 PhotonCast.dmg > PhotonCast.dmg.sha256
          cat PhotonCast.dmg.sha256

      # Upload DMG artifact
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotonCast-dmg
          path: |
            build/PhotonCast.dmg
            build/PhotonCast.dmg.sha256
          if-no-files-found: error
          retention-days: 30

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.APP_NAME }} ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            build/PhotonCast.dmg
            build/PhotonCast.dmg.sha256
          body: |
            ## PhotonCast ${{ steps.version.outputs.version }}

            ### Installation

            1. Download `PhotonCast.dmg` from the assets below
            2. Open the DMG and drag **PhotonCast** to your **Applications** folder
            3. Launch PhotonCast from Applications

            ### Requirements

            - macOS 12.0 or later
            - Apple Silicon or Intel Mac

            ### SHA256 Checksum

            ```
            $(cat build/PhotonCast.dmg.sha256 | cut -d' ' -f1)  PhotonCast.dmg
            ```

            ### Full Changelog

            See [CHANGELOG.md](../blob/main/CHANGELOG.md) for full details.

  # Update appcast feed if hosted in repository
  update-appcast:
    name: Update Appcast Feed
    runs-on: ubuntu-latest
    needs: create-release
    if: github.repository == 'photoncast/photoncast'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate appcast feed
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/PhotonCast.dmg"

          # Get DMG size (this would need the actual file, simplified here)
          DMG_SIZE="0"

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>PhotonCast Changelog</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <description><![CDATA[
                  <h2>What's New in ${VERSION}</h2>
                  <p>See the <a href="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}">release notes</a> for details.</p>
                ]]></description>
                <enclosure url="${DMG_URL}"
                           sparkle:edSignature="placeholder"
                           length="${DMG_SIZE}"
                           type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF

          cat appcast.xml

      # Note: To actually commit the appcast, you'd need to push to a branch
      # or commit to a docs/ directory. This is a placeholder showing the structure.

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: appcast.xml
          retention-days: 30
