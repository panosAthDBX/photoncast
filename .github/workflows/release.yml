name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  APP_NAME: PhotonCast
  BUNDLE_ID: com.photoncast.app

jobs:
  # Build and test before creating release
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release --workspace

      - name: Upload release binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoncast-release-binary
          path: target/release/photoncast
          if-no-files-found: error
          retention-days: 1

  # Create signed, notarized DMG release
  create-release:
    name: Create Release
    runs-on: macos-latest
    needs: build-and-test
    environment: release
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      # Setup code signing certificates from GitHub secrets
      - name: Setup signing certificates
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE" ]]; then
            echo "Warning: MACOS_CERTIFICATE secret not set. Will sign with ad-hoc signature."
            exit 0
          fi

          # Create keychain
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

          # Clean up
          rm certificate.p12

          echo "Certificate imported successfully"

      # Build release app bundle
      - name: Build release app bundle
        run: |
          ./scripts/release-build.sh ${{ steps.version.outputs.version }}

      # Sign the app bundle
      - name: Sign app bundle
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          if [[ -n "$APPLE_DEVELOPER_ID" ]]; then
            ./scripts/sign.sh "$APPLE_DEVELOPER_ID"
          else
            echo "Signing with ad-hoc signature (no developer ID provided)"
            codesign --sign - --force --deep build/PhotonCast.app
          fi

      # Create DMG
      - name: Create DMG
        run: |
          ./scripts/create-dmg.sh

      # Notarize the DMG (requires Apple Developer account)
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_KEY_ID: ${{ secrets.API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.API_KEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.API_KEY_BASE64 }}
        run: |
          if [[ -n "$API_KEY_ID" && -n "$API_KEY_ISSUER_ID" && -n "$API_KEY_BASE64" ]]; then
            # Use API Key authentication
            echo "$API_KEY_BASE64" | base64 --decode > AuthKey.p8
            export API_KEY_PATH="$(pwd)/AuthKey.p8"
            ./scripts/notarize.sh --api-key
            rm -f AuthKey.p8
          elif [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            # Use Apple ID authentication
            ./scripts/notarize.sh
          else
            echo "Warning: No notarization credentials provided. Skipping notarization."
            echo "The DMG will work but may show Gatekeeper warnings."
          fi

      # Generate SHA256 checksum
      - name: Generate checksum
        run: |
          cd build
          shasum -a 256 PhotonCast.dmg > PhotonCast.dmg.sha256
          cat PhotonCast.dmg.sha256

      # Upload DMG artifact
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotonCast-dmg
          path: |
            build/PhotonCast.dmg
            build/PhotonCast.dmg.sha256
          if-no-files-found: error
          retention-days: 30

      # Create GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ env.APP_NAME }} ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## PhotonCast ${{ steps.version.outputs.version }}

            ### Installation

            1. Download `PhotonCast.dmg` from the assets below
            2. Open the DMG and drag **PhotonCast** to your **Applications** folder
            3. Launch PhotonCast from Applications

            ### Requirements

            - macOS 12.0 or later
            - Apple Silicon or Intel Mac

            ### SHA256 Checksum

            ```
            $(cat build/PhotonCast.dmg.sha256 | cut -d' ' -f1)  PhotonCast.dmg
            ```

            ### Full Changelog

            See [CHANGELOG.md](../blob/main/CHANGELOG.md) for full details.

      # Upload DMG to GitHub Release
      - name: Upload DMG to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/PhotonCast.dmg
          asset_name: PhotonCast.dmg
          asset_content_type: application/x-apple-diskimage

      # Upload checksum to GitHub Release
      - name: Upload checksum to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/PhotonCast.dmg.sha256
          asset_name: PhotonCast.dmg.sha256
          asset_content_type: text/plain

  # Update appcast feed if hosted in repository
  update-appcast:
    name: Update Appcast Feed
    runs-on: ubuntu-latest
    needs: create-release
    if: github.repository == 'photoncast/photoncast'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate appcast feed
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/PhotonCast.dmg"

          # Get DMG size (this would need the actual file, simplified here)
          DMG_SIZE="0"

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>PhotonCast Changelog</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <description><![CDATA[
                  <h2>What's New in ${VERSION}</h2>
                  <p>See the <a href="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}">release notes</a> for details.</p>
                ]]></description>
                <enclosure url="${DMG_URL}"
                           sparkle:edSignature="placeholder"
                           length="${DMG_SIZE}"
                           type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF

          cat appcast.xml

      # Note: To actually commit the appcast, you'd need to push to a branch
      # or commit to a docs/ directory. This is a placeholder showing the structure.

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: appcast.xml
          retention-days: 30
